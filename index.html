<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arthur Veloso | Student ID - 77933</title>

<!-- Font Awesome icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Page layout */

body{
margin:0;
font-family:Arial, sans-serif;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* Counter number */

#value{
font-size:80px;
color:#222;
margin:20px 0;
}

/* Buttons container */

.button-container{
display:flex;
gap:20px;
}

/* Button style */

button{
padding:12px 20px;
font-size:18px;
border-radius:8px;
border:1px solid #333;
cursor:pointer;
background:white;
}

button:hover{
background:#eee;
}

</style>

</head>

<body>

<section>

<h1>Counter</h1>

<!-- Counter display -->
<span id="value">0</span>

<!-- Button container -->
<div class="button-container">

<button class="btn" id="decrease">
<i class="fa-solid fa-circle-minus"></i> Decrease
</button>

<button class="btn" id="reset">
<i class="fa-solid fa-rotate-left"></i> Reset
</button>

<button class="btn" id="increase">
<i class="fa-solid fa-circle-plus"></i> Increase
</button>

</div>

</section>

<script>

// Store the current counter value
let count = 0;

// Select the span that displays the counter
const value = document.getElementById("value");

// Select the container that holds the buttons
const buttons = document.querySelector(".button-container");

// Listen for click events on the button container
buttons.addEventListener("click", (e) => {

    // Only run if a button was clicked
    if(e.target.classList.contains("btn") || e.target.parentElement.classList.contains("btn")){

        // Detect the correct button even if the icon is clicked
        const button = e.target.closest("button");

        // Increase counter
        if(button.id === "increase"){
            count++;
        }

        // Decrease counter
        else if(button.id === "decrease"){
            count--;
        }

        // Reset counter
        else if(button.id === "reset"){
            count = 0;
        }

        // Update the number on screen
        value.innerText = count;

        // Change color based on value
        if(count > 0){
            value.style.color = "green";
        }

        else if(count < 0){
            value.style.color = "red";
        }

        else{
            value.style.color = "#222";
        }

    }

});

</script>


</body>
</html>
